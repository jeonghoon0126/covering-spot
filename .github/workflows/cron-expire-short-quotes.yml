name: Cron - 견적 6시간 만료 체크

on:
  schedule:
    # 매 30분마다 실행 (UTC 기준)
    - cron: "*/30 * * * *"
  workflow_dispatch: # 수동 실행 가능

jobs:
  expire:
    runs-on: ubuntu-latest
    steps:
      - name: Call expire-short-quotes API
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://coveringspot.vercel.app/api/cron/expire-short-quotes")
          echo "HTTP Status: $RESPONSE"
          if [[ "$RESPONSE" != "200" ]]; then
            echo "Cron job returned non-200: $RESPONSE"
            exit 1
          fi
