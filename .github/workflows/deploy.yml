name: Deploy to Vercel
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Vercel REST API (gitSource — no file upload)
        run: |
          REPO_ID=$(curl -s "https://api.github.com/repos/${{ github.repository }}" \
            -H "Authorization: Bearer ${{ github.token }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          RESPONSE=$(curl -s -X POST \
            "https://api.vercel.com/v13/deployments?teamId=team_EyB9AZd0p5WrrY8og8951AY1" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"coveringspot\",\"project\":\"prj_KCWVWdYmkH7gMyee4CkoD3RMhGJa\",\"target\":\"production\",\"gitSource\":{\"type\":\"github\",\"repoId\":${REPO_ID},\"ref\":\"main\"}}")

          DEPLOY_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('url',''))")
          echo "Deployment: $DEPLOY_URL"

          if [ -z "$DEPLOY_URL" ]; then
            echo "Failed to create deployment: $RESPONSE"
            exit 1
          fi

          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV

          for i in $(seq 1 24); do
            sleep 15
            STATE=$(curl -s "https://api.vercel.com/v13/deployments/$DEPLOY_URL?teamId=team_EyB9AZd0p5WrrY8og8951AY1" \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('readyState',''))")
            echo "($i) $STATE"
            if [[ "$STATE" == "READY" ]]; then exit 0; fi
            if [[ "$STATE" == "ERROR" ]]; then echo "Build failed"; exit 1; fi
          done
          echo "Timeout"; exit 1

      - name: Notify Slack (success)
        if: success()
        continue-on-error: true
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          # 이번 push에 포함된 커밋만 추출 (before → current)
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          # 첫 push(before=0000...)인 경우 최신 커밋 1개만
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            COMMITS=$(git log --oneline -1)
          else
            COMMITS=$(git log --oneline "${BEFORE}..${AFTER}" 2>/dev/null || git log --oneline -3)
          fi

          python3 - <<PYEOF
          import json, urllib.request, subprocess

          short_sha = "$SHORT_SHA"
          commits = """$COMMITS"""

          lines = [l.strip() for l in commits.strip().splitlines() if l.strip()]
          if len(lines) == 1:
              commit_text = lines[0]
          else:
              commit_text = "\n".join(f"• {l}" for l in lines)

          text = f"✅ *프로덕션 배포 완료* (`{short_sha}`)\nhttps://coveringspot.vercel.app\n\n{commit_text}"

          payload = json.dumps({"channel": "U09PTJ5PBDK", "text": text}).encode()
          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=payload,
              headers={"Authorization": "Bearer ${{ secrets.SLACK_BOT_TOKEN }}", "Content-Type": "application/json"}
          )
          urllib.request.urlopen(req)
          PYEOF

      - name: Notify Slack (failure)
        if: failure()
        continue-on-error: true
        run: |
          MSG="${{ github.event.head_commit.message }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"channel\":\"U09PTJ5PBDK\",\"text\":\"❌ *프로덕션 배포 실패*\n\`${SHORT_SHA}\` ${MSG}\nhttps://github.com/${{ github.repository }}/actions\"}"
